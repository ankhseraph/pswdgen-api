name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/pswdgen-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t pswdgen-api:test .

      - name: Run linter (ruff)
        run: docker run --rm pswdgen-api:test --env-file .env ruff check app/
        
      - name: Run tests (pytest)
        run: docker run --rm pswdgen-api:test --env-file .env pytest

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:${{ github.sha }}
